name: Build and Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: |
          python src/main.py

      - name: Start FastAPI app
        run: |
          pkill -f "uvicorn src.application:application" || true
          nohup python -m uvicorn src.application:application --host 0.0.0.0 --port 8000 > app.log 2>&1 &
          sleep 5
          curl -I http://127.0.0.1:8000/