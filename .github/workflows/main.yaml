name: Deploy FastAPI app to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to EC2 via SSH
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USERNAME }}
          key: ${{ secrets.AWS_EC2_PRIVATE_KEY }}
          source: '.'
          target: ${{ secrets.AWS_EC2_TARGET_DIR }}
          overwrite: true
          rm: true

      - name: Start/Update app on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USERNAME }}
          key: ${{ secrets.AWS_EC2_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.AWS_EC2_TARGET_DIR }}
            sudo apt-get update
            sudo apt-get install -y python3-pip python3-venv

            python3 -m venv .venv
            source .venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            sudo tee /etc/systemd/system/railway-app.service > /dev/null <<'EOF'
            [Unit]
            Description=Railway Failure Prediction FastAPI App
            After=network.target

            [Service]
            WorkingDirectory=${{ secrets.AWS_EC2_TARGET_DIR }}
            Environment=PATH=${{ secrets.AWS_EC2_TARGET_DIR }}/.venv/bin:/usr/bin:/bin
            ExecStart=${{ secrets.AWS_EC2_TARGET_DIR }}/.venv/bin/uvicorn src.application:application --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable railway-app
            sudo systemctl restart railway-app
